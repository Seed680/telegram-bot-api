name: Build Linux x86_64 and ARM64

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-x86_64:
    name: Build for Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make gperf zlib1g-dev libssl-dev

      - name: Build x86_64
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --target install

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-bot-api-x86_64
          path: build/telegram-bot-api

  build-arm64:
    name: Build for Linux ARM64 (aarch64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install cross-compilation dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
      
          # 安装主机环境和交叉编译工具
          sudo apt-get install -y \
            cmake g++ make gperf gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libssl-dev
      
          # 构建依赖和源码包
          sudo apt-get build-dep -y zlib1g
          apt source zlib1g
          cd zlib1g-*
          
          # 交叉编译并安装 zlib 到指定交叉根路径
          ./configure \
            --prefix=/usr/aarch64-linux-gnu \
            --libdir=/usr/aarch64-linux-gnu/lib \
            --includedir=/usr/aarch64-linux-gnu/include \
            --shared \
            --static \
            --cross-prefix=aarch64-linux-gnu-
          make -j$(nproc)
          sudo make install
      
      - name: Build ARM64 (aarch64)
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH=/usr/aarch64-linux-gnu \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DZLIB_INCLUDE_DIR=/usr/aarch64-linux-gnu/include \
            -DZLIB_LIBRARY=/usr/aarch64-linux-gnu/lib/libz.so \
            ..
          
          cmake --build . --target install


      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-bot-api-arm64
          path: build/telegram-bot-api
