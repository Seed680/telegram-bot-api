name: Build Linux x86_64 and ARM64

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-x86_64:
    name: Build for Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make gperf zlib1g-dev libssl-dev

      - name: Build x86_64
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --target install

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-bot-api-x86_64
          path: build/telegram-bot-api

  build-arm64:
    name: Build for Linux ARM64 (aarch64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install cross-compilation dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          build-essential \
          cmake \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          git \
          gperf \
          zlib1g-dev \
          libssl-dev
          
      - name: Create build directories
        run: |
          mkdir -p build
          mkdir -p build-native

      - name: Prepare for cross-compilation (if needed)
        run: |
          cd build-native
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --target prepare_cross_compiling
      
      - name: Add ARM64 architecture and manually configure sources
        run: |
          # 添加 arm64 架构
          sudo dpkg --add-architecture arm64
      
          # 手动创建 ARM64 源文件，完全复制 Dockerfile 的操作
          # 使用 tee 命令和 sudo 来写入受保护的系统目录
          # --- 新的、更稳健的添加源的方法 ---
          # 将 ARM64 源的内容写入一个临时文件
          cat > /tmp/ubuntu-arm64.sources << 'INNER_EOF'
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe restricted multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          INNER_EOF

          # 使用 sudo 将临时文件移动到 /etc/apt/sources.list.d/ 目录
          # 这会创建或覆盖 ubuntu.sources 文件
          sudo mv /tmp/ubuntu-arm64.sources /etc/apt/sources.list.d/ubuntu.sources
          # --- 源添加完毕 ---
      - name: Update package list and install target (ARM64) dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          zlib1g-dev:arm64 \
          libssl-dev:arm64
          
      - name: Run CMake for cross-compilation
        run: |
         cd build
         # 运行 CMake 配置，使用 CMAKE_PREFIX_PATH 指定 ARM64 库的根路径
         cmake \
         -DCMAKE_BUILD_TYPE=Release \
         -DCMAKE_SYSTEM_NAME=Linux \
         -DCMAKE_CROSSCOMPILING=True \
         -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
         -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
         # 关键修改：告诉 CMake 去 /usr/lib/aarch64-linux-gnu 查找库和头文件
         -DCMAKE_PREFIX_PATH=/usr/lib/aarch64-linux-gnu \
         ..
         # 开始编译
         cmake --build .


      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-bot-api-arm64
          path: build/telegram-bot-api
